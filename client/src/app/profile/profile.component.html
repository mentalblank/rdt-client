<div class="container mt-4">
    <h1 class="title is-3 mb-5">User Profile</h1>
    
    <div class="box p-5 rounded shadow-sm">
        <div class="field card-field mb-5">
          <label class="label uppercase-label">Login username</label>
          <div class="control has-icons-left">
            <input class="input" type="text" minlength="1" [(ngModel)]="username" />
            <span class="icon is-small is-left"><i class="fas fa-user"></i></span>
          </div>
          <p class="help mt-2">
            The username used to access RDT-Client. Only change this if you want to update your login credentials.
          </p>
        </div>

        <div class="field card-field mb-5">
          <label class="label uppercase-label">Login password</label>
          <div class="control has-icons-left">
            <input class="input" type="password" minlength="1" [(ngModel)]="password" placeholder="Enter new password" />
            <span class="icon is-small is-left"><i class="fas fa-lock"></i></span>
          </div>
          <p class="help mt-2">
            The password used to access RDT-Client.
          </p>
        </div>

        <div class="field mt-6">
          <div class="control">
            <button class="button is-primary is-medium px-6" (click)="save()" [disabled]="saving" [ngClass]="{ 'is-loading': saving }">
              <span class="icon"><i class="fas fa-save"></i></span>
              <span>Save Profile</span>
            </button>
          </div>
        </div>

        @if (error) {
          <div class="notification is-danger is-light mt-4 border-light animate-fade-in">
              <button class="delete" (click)="error = null"></button>
              <i class="fas fa-times-circle mr-2"></i> Error saving profile: {{ error }}
          </div>
        }

        @if (success) {
          <div class="notification is-success is-light mt-4 border-light animate-fade-in">
              <button class="delete" (click)="success = false"></button>
              <i class="fas fa-check-circle mr-2"></i> Your profile has been updated successfully.
          </div>
        }
    </div>
</div>
